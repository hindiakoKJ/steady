apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
  compileSdkVersion 35
  namespace "expo.modules.androidsms"

  defaultConfig {
    minSdkVersion 24
    targetSdkVersion 35
  }
  compileOptions {
    sourceCompatibility JavaVersion.VERSION_11
    targetCompatibility JavaVersion.VERSION_11
  }
  kotlinOptions {
    jvmTarget = JavaVersion.VERSION_11.majorVersion
  }
}

repositories {
  mavenCentral()
  google()
}

dependencies {
  implementation "expo.modules.kotlin:expo-modules-core:+"
}
